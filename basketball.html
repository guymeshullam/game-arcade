<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #fff; }
    h1 { color: #ff9f43; text-shadow: 0 0 15px #ff9f43; font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 12px; }
    canvas { display: block; border: 2px solid #ff9f43; box-shadow: 0 0 25px #ff9f43; max-width: 100%; }
    .info { color: #666; font-size: 0.82rem; margin-top: 8px; letter-spacing: 2px; }
    .back { margin-top: 14px; padding: 10px 24px; background: transparent; border: 2px solid #ff9f43; color: #ff9f43; font-family: 'Courier New', monospace; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .back:hover { background: #ff9f43; color: #000; }
  </style>
</head>
<body>
  <h1>&#127944; BASKETBALL</h1>
  <canvas id="c" width="800" height="480"></canvas>
  <p class="info">Hold SPACE to power up — Release to shoot | A / D to move closer or further</p>
  <a href="index.html" class="back">&#8592; TRUE GUY'S ARCADE</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 480;

// Hoop
const HOOP = { x: 650, y: 175, r: 22, postX: 700, boardTop: 130, boardBot: 215 };
const FLOOR_Y = 400;
const NET_SEGS = 8;

let state = 'start';
let made = 0, attempts = 0, streak = 0, bestStreak = 0;
let totalTime = 60, timeLeft = 60, timerSub = 0;

// Player
const PLAYER_POSITIONS = [200, 280, 360, 440]; // x positions (distances from hoop)
let playerPos = 1; // index into PLAYER_POSITIONS
const player = { x: PLAYER_POSITIONS[1], y: FLOOR_Y - 90, w: 28, h: 90 };

// Ball state
let ball = { x: player.x, y: player.y - 30, r: 14, vx: 0, vy: 0, active: false, scored: false };
let power = 0, charging = false, charged = false;
let ballTrail = [];
let netWave = 0, netWaveTimer = 0;
let particles = [];
let showMade = 0, showMissed = 0;
let frame = 0;

// Physics
const GRAVITY = 0.42;

function shotAngle() {
  // Calculate realistic shot angle from player to hoop with arc
  const dx = HOOP.x - ball.x, dy = HOOP.y - ball.y;
  return Math.atan2(dy, dx) - 0.55; // arc upward
}

function launch() {
  if (ball.active || state !== 'playing') return;
  const angle = shotAngle();
  // Power maps to speed (8 = too short, 16 = perfect, 22 = too long)
  const spd = 8 + power * 16;
  ball.vx = Math.cos(angle) * spd;
  ball.vy = Math.sin(angle) * spd;
  ball.active = true;
  ball.scored = false;
  attempts++;
  ballTrail = [];
}

function reset() {
  made = 0; attempts = 0; streak = 0;
  timeLeft = totalTime; timerSub = 0;
  resetBall();
  state = 'playing';
}

function resetBall() {
  player.x = PLAYER_POSITIONS[playerPos];
  ball.x = player.x + 8; ball.y = player.y - 20;
  ball.vx = 0; ball.vy = 0; ball.active = false; ball.scored = false;
  power = 0; charging = false; charged = false;
  ballTrail = [];
}

function checkScore() {
  // Ball passing through hoop: x near HOOP.x, y near HOOP.y, moving downward
  if (ball.vy > 0 &&
      Math.abs(ball.x - HOOP.x) < HOOP.r - 4 &&
      Math.abs(ball.y - HOOP.y) < 14) {
    ball.scored = true;
    made++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    netWave = 1; netWaveTimer = 30;
    showMade = 60;
    // Bonus points for streaks
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({ x: HOOP.x, y: HOOP.y, vx: Math.cos(a)*(2+Math.random()*4), vy: Math.sin(a)*(2+Math.random()*4), life: 1, r: 3+Math.random()*5, color: '#ff9f43' });
    }
    return true;
  }
  return false;
}

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'start' || state === 'end') { reset(); return; }
    if (!ball.active && !charged) { charging = true; }
  }
  if ((e.code === 'KeyA' || e.code === 'ArrowLeft') && !ball.active) {
    playerPos = Math.min(PLAYER_POSITIONS.length - 1, playerPos + 1);
    resetBall();
  }
  if ((e.code === 'KeyD' || e.code === 'ArrowRight') && !ball.active) {
    playerPos = Math.max(0, playerPos - 1);
    resetBall();
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space' && charging) {
    charging = false;
    charged = true;
    launch();
  }
});

function update() {
  if (state !== 'playing') return;
  frame++;

  // Timer
  timerSub++;
  if (timerSub >= 60) { timerSub = 0; timeLeft--; }
  if (timeLeft <= 0) { state = 'end'; return; }

  // Power charge
  if (charging && !ball.active) {
    power = Math.min(1, power + 0.025);
  }

  if (netWaveTimer > 0) netWaveTimer--;
  if (showMade > 0) showMade--;
  if (showMissed > 0) showMissed--;

  if (!ball.active) { ball.x = player.x + 8; ball.y = player.y - 20; return; }

  // Ball physics
  ball.vy += GRAVITY;
  ball.x += ball.vx;
  ball.y += ball.vy;
  ballTrail.push({ x: ball.x, y: ball.y, life: 1 });
  if (ballTrail.length > 18) ballTrail.shift();
  for (const t of ballTrail) t.life -= 0.06;

  // Check score
  if (!ball.scored) checkScore();

  // Bounce off backboard
  if (ball.x + ball.r > HOOP.postX - 6 && ball.y > HOOP.boardTop && ball.y < HOOP.boardBot) {
    ball.vx = -Math.abs(ball.vx) * 0.55;
    ball.x = HOOP.postX - 6 - ball.r;
  }

  // Bounce off rim
  const rimDist = Math.hypot(ball.x - HOOP.x, ball.y - HOOP.y);
  if (rimDist < ball.r + 5 && !ball.scored) {
    const nx = (ball.x - HOOP.x) / rimDist, ny = (ball.y - HOOP.y) / rimDist;
    const dot = ball.vx * nx + ball.vy * ny;
    ball.vx = (ball.vx - 2 * dot * nx) * 0.5;
    ball.vy = (ball.vy - 2 * dot * ny) * 0.5;
    // Rim at inner edge
    const dist2 = Math.hypot(ball.x - (HOOP.x - HOOP.r), ball.y - HOOP.y);
    if (dist2 < ball.r + 5) {
      ball.vx = Math.abs(ball.vx) * 0.5;
    }
  }

  // Floor
  if (ball.y + ball.r > FLOOR_Y) {
    if (!ball.scored) {
      streak = 0;
      showMissed = 50;
    }
    ball.vy *= -0.4;
    ball.vx *= 0.75;
    ball.y = FLOOR_Y - ball.r;
    if (Math.abs(ball.vy) < 1.5) {
      setTimeout(resetBall, 800);
      ball.active = false;
      charged = false;
    }
  }

  // Out of bounds left
  if (ball.x < -50 || ball.y < -200) {
    streak = 0;
    showMissed = 50;
    setTimeout(resetBall, 400);
    ball.active = false; charged = false;
  }

  // Particles
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.04; }
  particles = particles.filter(p => p.life > 0);
}

function drawCourt() {
  // Sky/background
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#87CEEB'); sky.addColorStop(1, '#c8e6f8');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // Stands/bleachers behind
  ctx.fillStyle = '#8B7355';
  ctx.fillRect(0, 260, W, H - 260);
  ctx.fillStyle = '#7A6245';
  for (let y = 265; y < H; y += 28) ctx.fillRect(0, y, W, 14);

  // Court floor (hardwood)
  const floor = ctx.createLinearGradient(0, FLOOR_Y, 0, H);
  floor.addColorStop(0, '#D4A57A'); floor.addColorStop(1, '#B8864E');
  ctx.fillStyle = floor; ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);

  // Court lines
  ctx.strokeStyle = '#c47a3a'; ctx.lineWidth = 2;
  // Free throw line
  ctx.beginPath(); ctx.moveTo(PLAYER_POSITIONS[0] - 30, FLOOR_Y); ctx.lineTo(PLAYER_POSITIONS[0] - 30, FLOOR_Y + 30); ctx.stroke();
  // Lane lines
  ctx.beginPath(); ctx.moveTo(PLAYER_POSITIONS[0] - 30, FLOOR_Y); ctx.lineTo(HOOP.x + 15, FLOOR_Y); ctx.stroke();
  // 3-point arc (simplified)
  ctx.beginPath();
  ctx.arc(HOOP.x + 15, FLOOR_Y, 190, Math.PI, Math.PI * 2);
  ctx.stroke();
  // Hardwood grain lines
  ctx.strokeStyle = 'rgba(180,120,60,0.3)'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 18) { ctx.beginPath(); ctx.moveTo(x, FLOOR_Y); ctx.lineTo(x, H); ctx.stroke(); }

  // Distance markers
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'center';
  PLAYER_POSITIONS.forEach((px, i) => {
    const dist = Math.round((HOOP.x - px) * 0.1);
    ctx.fillText(dist + 'ft', px, FLOOR_Y + 18);
  });
  ctx.textAlign = 'left';
}

function drawHoop() {
  // Backboard pole
  ctx.fillStyle = '#555';
  ctx.fillRect(HOOP.postX - 5, HOOP.boardTop - 10, 10, H - HOOP.boardTop + 10);

  // Backboard
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(HOOP.postX - 6, HOOP.boardTop, 14, HOOP.boardBot - HOOP.boardTop);
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2;
  ctx.strokeRect(HOOP.postX - 6, HOOP.boardTop, 14, HOOP.boardBot - HOOP.boardTop);
  // Shooting square
  ctx.strokeStyle = '#f44'; ctx.lineWidth = 2;
  ctx.strokeRect(HOOP.postX - 5, HOOP.boardTop + 18, 12, 22);

  // Hoop arm
  ctx.fillStyle = '#888';
  ctx.fillRect(HOOP.x, HOOP.y - 5, HOOP.postX - HOOP.x - 5, 8);

  // Hoop ring
  ctx.strokeStyle = '#e84f1f'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.arc(HOOP.x, HOOP.y, HOOP.r, 0, Math.PI * 2); ctx.stroke();
  // Near rim highlight
  ctx.strokeStyle = '#f07040'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(HOOP.x, HOOP.y, HOOP.r + 1, Math.PI * 0.2, Math.PI * 0.8); ctx.stroke();

  // Net
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.2;
  const netH = 38;
  const netWaveAmt = netWaveTimer > 0 ? Math.sin(netWaveTimer * 0.4) * 6 : 0;
  for (let i = 0; i <= NET_SEGS; i++) {
    const angle = (i / NET_SEGS) * Math.PI;
    const topX = HOOP.x + Math.cos(Math.PI + angle) * HOOP.r;
    const topY = HOOP.y + 3;
    const botX = HOOP.x + Math.cos(Math.PI + angle) * (HOOP.r * 0.4) + netWaveAmt * Math.sin(i * 0.8);
    const botY = HOOP.y + netH;
    ctx.beginPath(); ctx.moveTo(topX, topY); ctx.lineTo(botX, botY); ctx.stroke();
  }
  for (let row = 1; row <= 3; row++) {
    ctx.beginPath();
    for (let i = 0; i <= NET_SEGS; i++) {
      const angle = (i / NET_SEGS) * Math.PI;
      const t = row / 4;
      const rx = HOOP.r * (1 - t * 0.65);
      const x2 = HOOP.x + Math.cos(Math.PI + angle) * rx + netWaveAmt * t * Math.sin(i * 0.8);
      const y2 = HOOP.y + netH * t;
      i === 0 ? ctx.moveTo(x2, y2) : ctx.lineTo(x2, y2);
    }
    ctx.stroke();
  }
}

function drawPlayer() {
  const px = player.x - player.w / 2, py = player.y;
  const shooting2 = charging || (ball.active && frame % 20 < 10);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(player.x, FLOOR_Y + 4, 16, 5, 0, 0, Math.PI*2); ctx.fill();

  // Shoes
  ctx.fillStyle = '#fff';
  ctx.fillRect(px + 2, py + player.h - 8, 14, 8);
  ctx.fillRect(px + player.w - 14, py + player.h - 8, 14, 8);

  // Legs
  ctx.fillStyle = '#B22222';
  if (shooting2) {
    ctx.fillRect(px + 2, py + 55, 10, 30);
    ctx.fillRect(px + player.w - 12, py + 55, 10, 28);
  } else {
    ctx.fillRect(px + 2, py + 55, 10, 30);
    ctx.fillRect(px + player.w - 12, py + 55, 10, 30);
  }

  // Shorts
  ctx.fillStyle = '#B22222';
  ctx.fillRect(px + 1, py + 42, player.w - 2, 18);

  // Jersey
  ctx.fillStyle = '#fff';
  ctx.fillRect(px + 3, py + 16, player.w - 6, 30);
  // Jersey number
  ctx.fillStyle = '#B22222';
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('23', player.x, py + 37);
  ctx.textAlign = 'left';

  // Head
  ctx.fillStyle = '#D4A882';
  ctx.beginPath(); ctx.arc(player.x, py + 9, 11, 0, Math.PI * 2); ctx.fill();

  // Headband
  ctx.fillStyle = '#B22222';
  ctx.fillRect(player.x - 11, py + 3, 22, 5);

  // Arms
  ctx.fillStyle = '#D4A882';
  if (shooting2) {
    // Shooting motion - right arm up
    ctx.fillRect(px + player.w - 5, py + 14, 10, 28);
    ctx.fillRect(px - 5, py + 22, 10, 18);
  } else {
    ctx.fillRect(px - 5, py + 18, 10, 24);
    ctx.fillRect(px + player.w - 5, py + 18, 10, 24);
  }
}

function drawBall() {
  if (ball.active || charged) {
    // Trail
    for (let i = 0; i < ballTrail.length; i++) {
      const t = ballTrail[i];
      ctx.globalAlpha = t.life * 0.3;
      ctx.fillStyle = '#ff8c00';
      ctx.beginPath(); ctx.arc(t.x, t.y, ball.r * t.life * 0.6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Shadow
  const shadowScale = Math.max(0.2, 1 - (FLOOR_Y - ball.y) / 400);
  ctx.fillStyle = `rgba(0,0,0,${0.2 * shadowScale})`;
  ctx.beginPath(); ctx.ellipse(ball.x, FLOOR_Y + 3, ball.r * shadowScale * 1.2, 4, 0, 0, Math.PI*2); ctx.fill();

  // Ball
  const grad = ctx.createRadialGradient(ball.x - 4, ball.y - 4, 1, ball.x, ball.y, ball.r);
  grad.addColorStop(0, '#ff9f43');
  grad.addColorStop(0.7, '#e07010');
  grad.addColorStop(1, '#a04000');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();

  // Ball lines
  ctx.strokeStyle = '#5a2000'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(ball.x - ball.r, ball.y); ctx.lineTo(ball.x + ball.r, ball.y); ctx.stroke();
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r * 0.6, -Math.PI * 0.3, Math.PI * 0.3); ctx.stroke();
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r * 0.6, Math.PI - Math.PI * 0.3, Math.PI + Math.PI * 0.3); ctx.stroke();
}

function drawPowerBar() {
  if (ball.active) return;
  const bx = player.x - 20, by = player.y - 28;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(bx, by, 40, 10);
  const c = power < 0.5 ? `hsl(${120 - power*120},100%,50%)` : `hsl(${60 - (power-0.5)*120},100%,50%)`;
  ctx.fillStyle = c;
  ctx.fillRect(bx + 1, by + 1, (40 - 2) * power, 8);
  ctx.strokeStyle = power > 0.85 ? '#ff4444' : '#fff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx, by, 40, 10);

  // Aim trajectory preview
  if (power > 0.05) {
    const angle = shotAngle();
    const spd2 = 8 + power * 16;
    ctx.strokeStyle = 'rgba(255,255,100,0.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    let px2 = ball.x, py2 = ball.y;
    let pvx = Math.cos(angle) * spd2, pvy = Math.sin(angle) * spd2;
    ctx.moveTo(px2, py2);
    for (let i = 0; i < 25; i++) {
      pvy += GRAVITY; px2 += pvx; py2 += pvy;
      ctx.lineTo(px2, py2);
      if (py2 > FLOOR_Y || px2 > W) break;
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawHUD() {
  const pct = Math.min(1, timeLeft / totalTime);
  const tc = pct > 0.5 ? '#4CAF50' : pct > 0.25 ? '#ff9f43' : '#ff4444';

  // Timer bar
  ctx.fillStyle = '#222'; ctx.fillRect(10, 10, 200, 16);
  ctx.fillStyle = tc; ctx.fillRect(10, 10, 200 * pct, 16);
  ctx.strokeStyle = tc; ctx.lineWidth = 1.5; ctx.strokeRect(10, 10, 200, 16);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Courier New';
  ctx.fillText(timeLeft + 's', 15, 23);

  ctx.font = 'bold 18px Courier New';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(made + ' / ' + attempts, W/2, 28);
  ctx.font = '12px Courier New';
  ctx.fillStyle = '#888';
  ctx.fillText('MADE / ATTEMPTS', W/2, 44);
  ctx.textAlign = 'left';

  if (streak >= 2) {
    ctx.fillStyle = '#ff9f43';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText('\uD83D\uDD25 ' + streak + 'x STREAK!', W - 10, 28);
    ctx.textAlign = 'left';
  }

  // Position indicator
  ctx.fillStyle = '#666';
  ctx.font = '12px Courier New';
  ctx.fillText('A/D: move position', 10, H - 12);

  if (showMade > 0) {
    ctx.globalAlpha = showMade / 60;
    ctx.fillStyle = '#4CAF50';
    ctx.font = 'bold 36px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('SWISH!', W/2, H/2 - 20);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }
  if (showMissed > 0) {
    ctx.globalAlpha = showMissed / 50;
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 32px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('MISS', W/2, H/2 - 20);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawOverlay(title, sub, color, sub2) {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = color;
  ctx.font = 'bold 50px Courier New';
  ctx.fillText(title, W/2, H/2 - 40);
  ctx.fillStyle = '#fff';
  ctx.font = '22px Courier New';
  ctx.fillText(sub, W/2, H/2 + 10);
  if (sub2) { ctx.fillStyle = '#aaa'; ctx.font = '16px Courier New'; ctx.fillText(sub2, W/2, H/2 + 44); }
  ctx.textAlign = 'left';
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawCourt();
  drawHoop();
  drawBall();
  drawPlayer();
  drawPowerBar();
  drawHUD();

  if (state === 'start') drawOverlay('BASKETBALL', 'Hold SPACE to charge — Release to shoot!', '#ff9f43', 'A/D to move  |  You have 60 seconds');
  if (state === 'end') {
    const pct = attempts > 0 ? Math.round((made/attempts)*100) : 0;
    drawOverlay('TIME\'S UP!', 'Made: ' + made + '/' + attempts + ' (' + pct + '%)  Streak: ' + bestStreak, '#ff9f43', 'Press SPACE to play again');
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
