<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Dodger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace; color: #fff;
    }
    h1 { color: #ff9f43; text-shadow: 0 0 15px #ff9f43; font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 12px; }
    canvas { display: block; border: 2px solid #ff9f43; box-shadow: 0 0 25px #ff9f43; max-width: 100%; }
    .info { color: #666; font-size: 0.82rem; margin-top: 8px; letter-spacing: 2px; }
    .back { margin-top: 14px; padding: 10px 24px; background: transparent; border: 2px solid #ff9f43; color: #ff9f43; font-family: 'Courier New', monospace; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .back:hover { background: #ff9f43; color: #000; }
  </style>
</head>
<body>
  <h1>&#128663; ROAD DODGER</h1>
  <canvas id="c" width="520" height="680"></canvas>
  <p class="info">&#8592; &#8594; or A / D to change lanes</p>
  <a href="index.html" class="back">&#8592; TRUE GUY'S ARCADE</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 520, H = 680;

// Road layout
const RL = 90, RR = 430, RW = RR - RL;
const LANES = 3, LW = RW / LANES;
const LCX = [RL + LW*0.5, RL + LW*1.5, RL + LW*2.5];

let state = 'start', score = 0, hiScore = 0, speed = 5, frame = 0;
let roadY = 0, dashY = 0;

const player = { lane: 1, x: LCX[1], y: H - 130, w: 44, h: 90, tx: LCX[1], moving: false };

let traffic = [], particles = [], skidMarks = [];

const CAR_COLORS = ['#c0392b','#2980b9','#27ae60','#f39c12','#8e44ad','#e74c3c','#16a085','#d35400','#2c3e50','#7f8c8d'];

function spawnCar() {
  const lane = Math.floor(Math.random() * LANES);
  const type = Math.random() < 0.25 ? 'truck' : Math.random() < 0.4 ? 'suv' : 'sedan';
  const h = type === 'truck' ? 116 : type === 'suv' ? 96 : 88;
  const w = type === 'truck' ? 48 : 44;
  // Don't spawn too close to top of another car in same lane
  const existing = traffic.filter(c => c.lane === lane && c.y < 160);
  if (existing.length > 0) return;
  traffic.push({ lane, x: LCX[lane], y: -h - 10, w, h, color: CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)], type });
}

const keys = {};
document.addEventListener('keydown', e => {
  if (state === 'start' || state === 'dead') { if (e.code !== 'F5') reset(); return; }
  if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && !player.moving && player.lane > 0) {
    player.lane--; player.tx = LCX[player.lane]; player.moving = true;
  }
  if ((e.code === 'ArrowRight' || e.code === 'KeyD') && !player.moving && player.lane < 2) {
    player.lane++; player.tx = LCX[player.lane]; player.moving = true;
  }
  keys[e.code] = true;
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function reset() {
  score = 0; speed = 5; frame = 0;
  traffic = []; particles = []; skidMarks = [];
  player.lane = 1; player.x = LCX[1]; player.tx = LCX[1]; player.moving = false;
  state = 'playing';
}

function update() {
  if (state !== 'playing') return;
  frame++;
  score++;
  speed = 5 + score / 600;

  // Smooth lane change
  if (player.moving) {
    player.x += (player.tx - player.x) * 0.14;
    if (Math.abs(player.x - player.tx) < 1) { player.x = player.tx; player.moving = false; }
  }

  // Scroll
  roadY = (roadY + speed * 2.2) % 60;
  dashY = (dashY + speed * 2.2) % 80;

  // Spawn traffic
  if (frame % Math.floor(Math.max(22, 65 - speed * 5)) === 0) spawnCar();

  // Move traffic
  for (const c of traffic) c.y += speed * 1.3;
  traffic = traffic.filter(c => c.y < H + 140);

  // Collision
  for (const c of traffic) {
    if (Math.abs(player.x - c.x) < (player.w + c.w) / 2 - 10 &&
        Math.abs(player.y - c.y) < (player.h + c.h) / 2 - 14) {
      for (let i = 0; i < 28; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd2 = 2 + Math.random() * 7;
        particles.push({ x: player.x, y: player.y, vx: Math.cos(a)*spd2, vy: Math.sin(a)*spd2, life: 1, r: 3 + Math.random()*7, color: Math.random() < 0.5 ? '#ff6600' : '#ffcc00' });
      }
      if (score > hiScore) hiScore = score;
      state = 'dead';
      return;
    }
  }

  // Particles
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.28; p.life -= 0.033; }
  particles = particles.filter(p => p.life > 0);
}

// Draw road surface
function drawRoad() {
  // Grass/pavement sides
  ctx.fillStyle = '#2d5a1b';
  ctx.fillRect(0, 0, RL, H);
  ctx.fillRect(RR, 0, W - RR, H);

  // Sidewalks
  ctx.fillStyle = '#555';
  ctx.fillRect(RL - 12, 0, 12, H);
  ctx.fillRect(RR, 0, 12, H);

  // Road base
  ctx.fillStyle = '#333';
  ctx.fillRect(RL, 0, RW, H);

  // Road texture (subtle)
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = -roadY; y < H + 60; y += 60) {
    ctx.fillRect(RL, y, RW, 30);
  }

  // Center dashes
  ctx.strokeStyle = '#ffdd00';
  ctx.lineWidth = 3;
  ctx.setLineDash([38, 42]);
  for (let i = 1; i < LANES; i++) {
    const lx = RL + i * LW;
    ctx.lineDashOffset = -dashY;
    ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, H); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Edge solid lines
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(RL, 0); ctx.lineTo(RL, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(RR, 0); ctx.lineTo(RR, H); ctx.stroke();

  // Trees on sides
  for (let ty = -roadY; ty < H + 80; ty += 80) {
    drawTree(45, ty - 15, 0.85);
    drawTree(475, ty - 15, 0.85);
  }
}

function drawTree(x, y, scale) {
  const s = scale;
  ctx.fillStyle = '#2d5a1b';
  ctx.beginPath();
  ctx.moveTo(x, y - 28*s);
  ctx.lineTo(x - 16*s, y);
  ctx.lineTo(x + 16*s, y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1e4a12';
  ctx.beginPath();
  ctx.moveTo(x, y - 42*s);
  ctx.lineTo(x - 12*s, y - 16*s);
  ctx.lineTo(x + 12*s, y - 16*s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#5D4037';
  ctx.fillRect(x - 4*s, y, 8*s, 14*s);
}

function drawCar(x, y, w, h, color, isPlayer) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(x + 4, y + 8, w/2, 8, 0, 0, Math.PI*2); ctx.fill();

  const bx = x - w/2, by = y - h/2;

  // Body
  ctx.fillStyle = color;
  ctx.fillRect(bx, by + 10, w, h - 20);

  // Roof (cabin)
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fillRect(bx + 5, by + 15, w - 10, h * 0.4);

  // Windshield
  ctx.fillStyle = 'rgba(160,210,255,0.75)';
  if (isPlayer) {
    ctx.fillRect(bx + 7, by + h*0.4 + 8, w - 14, 12); // front = bottom for player going down
    ctx.fillRect(bx + 7, by + 15, w - 14, 11); // rear
  } else {
    ctx.fillRect(bx + 7, by + 15, w - 14, 11); // front windshield (top)
    ctx.fillRect(bx + 7, by + h*0.4 + 8, w - 14, 11); // rear
  }

  // Wheels
  ctx.fillStyle = '#111';
  const wy = [by + 10, by + h - 24];
  for (const wyy of wy) {
    ctx.fillRect(bx - 5, wyy, 10, 17);
    ctx.fillRect(bx + w - 5, wyy, 10, 17);
    ctx.fillStyle = '#444';
    ctx.fillRect(bx - 4, wyy + 3, 8, 11);
    ctx.fillRect(bx + w - 4, wyy + 3, 8, 11);
    ctx.fillStyle = '#111';
  }

  // Headlights / taillights
  if (isPlayer) {
    // Headlights at bottom (driving down screen)
    ctx.fillStyle = '#ffff99';
    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 8;
    ctx.fillRect(bx + 5, by + h - 12, 10, 7);
    ctx.fillRect(bx + w - 15, by + h - 12, 10, 7);
    ctx.shadowBlur = 0;
    // Taillights at top
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 5;
    ctx.fillRect(bx + 5, by + 3, 10, 6);
    ctx.fillRect(bx + w - 15, by + 3, 10, 6);
    ctx.shadowBlur = 0;
  } else {
    // Taillights at top (same direction as player)
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 5;
    ctx.fillRect(bx + 5, by + 3, 10, 6);
    ctx.fillRect(bx + w - 15, by + 3, 10, 6);
    ctx.shadowBlur = 0;
    // Headlights at bottom
    ctx.fillStyle = '#ffffcc';
    ctx.fillRect(bx + 5, by + h - 12, 10, 7);
    ctx.fillRect(bx + w - 15, by + h - 12, 10, 7);
  }

  // Hood line detail
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(bx + 3, by + 10); ctx.lineTo(bx + w - 3, by + 10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + 3, by + h - 11); ctx.lineTo(bx + w - 3, by + h - 11); ctx.stroke();
}

function drawHUD() {
  const dist = Math.floor(score / 12);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('Dist: ' + dist + 'm', 10, 26);
  ctx.fillText('Best: ' + Math.floor(hiScore / 12) + 'm', 10, 50);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff9f43';
  ctx.fillText(speed.toFixed(1) + ' km/h', W - 10, 26);
  ctx.textAlign = 'left';

  // Speed bar
  ctx.fillStyle = '#333';
  ctx.fillRect(W - 110, 34, 100, 8);
  ctx.fillStyle = speed > 9 ? '#ff4444' : speed > 7 ? '#ff9f43' : '#4CAF50';
  ctx.fillRect(W - 110, 34, Math.min(100, (speed - 5) / 8 * 100), 8);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawRoad();
  for (const c of traffic) drawCar(c.x, c.y, c.w, c.h, c.color, false);
  drawCar(player.x, player.y, player.w, player.h, '#1565C0', true);
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  drawHUD();

  if (state === 'start' || state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = state === 'dead' ? '#ff4444' : '#ff9f43';
    ctx.font = 'bold 44px Courier New';
    ctx.fillText(state === 'dead' ? 'CRASH!' : 'ROAD DODGER', W/2, H/2 - 45);
    ctx.fillStyle = '#fff';
    ctx.font = '20px Courier New';
    ctx.fillText(state === 'dead' ? 'Distance: ' + Math.floor(score/12) + 'm   Best: ' + Math.floor(hiScore/12) + 'm' : 'Dodge traffic — survive as long as possible!', W/2, H/2 + 5);
    ctx.fillStyle = '#aaa';
    ctx.font = '15px Courier New';
    ctx.fillText('\u2190 \u2192 or A / D — change lanes', W/2, H/2 + 38);
    ctx.fillText('Press any key to ' + (state === 'dead' ? 'retry' : 'start'), W/2, H/2 + 66);
    ctx.textAlign = 'left';
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
